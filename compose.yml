services:
  jekyll:
    image: ruby:3.3
    working_dir: /website
    command: bash -c "bundle install && bundle exec jekyll serve --host 0.0.0.0 --watch --force_polling"
    ports:
      - "4000:4000"
    volumes:
      - .:/website
      - bundle_cache:/usr/local/bundle
    environment:
      JEKYLL_ENV: development

volumes:
  bundle_cache:
