name: Publish scheduled posts

on:
  workflow_dispatch:
  # schedule:
  #   - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Publish due posts
        run: python .github/scripts/publish_scheduled_posts.py

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No scheduled posts were published."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _posts
          git commit -m "chore(posts): publish scheduled posts"
          git push
